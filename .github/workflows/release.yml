name: Release Plugin

on:
  push:
    tags:
      - 'v*'   # triggers on any version tag e.g. v0.1, v1.2.0

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release zip
        run: |
          mkdir -p build
          # Copy plugin files, excluding dev/repo files
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='build' \
                    --exclude='*.md' \
                    --exclude='plugin-manifest.json' \
                    . build/g6-client-dashboard/
          cd build
          zip -r g6-client-dashboard-v${{ steps.version.outputs.VERSION }}.zip g6-client-dashboard/

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: build/g6-client-dashboard-v${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Gist manifest
        env:
          GIST_TOKEN: ${{ secrets.GABRIEL_GIST_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DATE=$(date -u '+%Y-%m-%d %H:%M:%S')
          DOWNLOAD_URL="https://github.com/Group6-Inc/g6-client-dashboard/releases/download/v${VERSION}/g6-client-dashboard-v${VERSION}.zip"

          # Update version, download_url, and last_updated from the tag
          CONTENT=$(jq \
            --arg v "$VERSION" \
            --arg url "$DOWNLOAD_URL" \
            --arg date "$DATE" \
            '.version = $v | .download_url = $url | .last_updated = $date' \
            plugin-manifest.json)

          # Push to Gist
          PAYLOAD=$(jq -n \
            --arg content "$CONTENT" \
            '{"files": {"g6-client-dashboard.json": {"content": $content}}}')

          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/gists/8d8b3d50ba384da12359e34c57efe39a \
            -d "$PAYLOAD"
